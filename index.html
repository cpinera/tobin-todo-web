<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do · Tobin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0e0e10; --surface:#18181c; --border:#2e2e38; --accent:#c8f060; --accent2:#60f0c8; --text:#f0f0ee; --muted:#7a7a8a; --danger:#f06060; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; }
  button { cursor:pointer; font-family:'DM Mono',monospace; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .container { max-width:900px; margin:0 auto; padding:36px 16px 80px; }
  .label { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(1.8rem,5vw,3rem); font-weight:800; letter-spacing:-0.02em; line-height:1; }
  h1 span { color:var(--accent); }
  .stats { display:flex; gap:20px; margin-top:12px; flex-wrap:wrap; }
  .stat { font-size:12px; color:var(--muted); } .stat strong { color:var(--text); font-weight:500; }
  .header-row { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:28px; }
  .btn-primary { background:var(--accent); color:#0e0e10; border:none; border-radius:10px; padding:11px 22px; font-family:'Syne',sans-serif; font-size:14px; font-weight:800; white-space:nowrap; }
  .btn-icon { background:var(--surface); border:1.5px solid var(--border); color:var(--muted); border-radius:10px; padding:11px 16px; font-size:13px; }
  .filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--muted); font-size:11px; padding:6px 14px; border-radius:20px; }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#0e0e10; font-weight:600; }

  /* Column headers */
  .col-headers { display:grid; grid-template-columns:26px 1fr 110px 160px 120px 100px 28px; gap:10px; align-items:center; padding:0 14px 6px; }
  .col-headers span { font-size:10px; color:#4a4a5a; letter-spacing:0.1em; text-transform:uppercase; }

  /* Task row */
  .task { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:10px 14px; display:grid; grid-template-columns:26px 1fr 110px 160px 120px 100px 28px; align-items:center; gap:10px; animation:fadeUp 0.2s ease both; margin-bottom:7px; transition:border-color 0.15s; }
  .task:hover { border-color:#3e3e52; }
  .task.done { opacity:0.45; }
  .task.in-progress { border-color:rgba(240,192,96,0.2); }

  .check { width:22px; height:22px; border-radius:6px; border:2px solid #3e3e50; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#0e0e10; font-size:11px; font-weight:700; user-select:none; transition:all 0.15s; }
  .check.done { background:var(--accent); border-color:var(--accent); }
  .check.progress { border-color:#f0c060; }

  .task-name { font-size:13px; color:var(--text); background:transparent; border:1px solid transparent; outline:none; font-family:'DM Mono',monospace; width:100%; padding:3px 6px; border-radius:6px; transition:all 0.15s; }
  .task-name:hover { background:rgba(255,255,255,0.04); }
  .task-name:focus { background:rgba(200,240,96,0.07); border-color:rgba(200,240,96,0.25); }
  .task.done .task-name { text-decoration:line-through; color:var(--muted); }

  /* Valor/Esfuerzo inline */
  .ve-cell { display:flex; align-items:center; gap:4px; }
  .ve-label { font-size:10px; color:#5a5a6a; flex-shrink:0; }
  .ve-input { width:36px; background:#111114; border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:12px; padding:3px 5px; border-radius:5px; outline:none; text-align:center; transition:border-color 0.15s; }
  .ve-input:focus { border-color:var(--accent); }
  .ve-sep { color:#3a3a4a; font-size:11px; }
  .ve-score { font-size:10px; padding:2px 6px; border-radius:4px; font-weight:700; white-space:nowrap; }

  .inline-select { background:transparent; border:1px solid transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; border-radius:6px; padding:3px 6px; outline:none; transition:all 0.15s; -webkit-appearance:none; appearance:none; }
  .inline-select:hover { background:rgba(255,255,255,0.05); }
  .inline-select:focus { background:rgba(200,240,96,0.07); border-color:rgba(200,240,96,0.2); }
  .inline-select option { background:#18181c; color:var(--text); }

  .inline-date { background:transparent; border:1px solid transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; border-radius:6px; padding:3px 6px; outline:none; transition:all 0.15s; width:100%; color-scheme:dark; }
  .inline-date:hover { background:rgba(255,255,255,0.05); }
  .inline-date:focus { background:rgba(200,240,96,0.07); color:var(--text); border-color:rgba(200,240,96,0.2); }

  .btn-del { background:none; border:none; color:#3a3a4a; font-size:13px; padding:3px 5px; border-radius:4px; transition:color 0.15s; }
  .btn-del:hover { color:var(--danger); }

  /* New task row */
  .new-task-row { background:rgba(200,240,96,0.04); border:1.5px dashed rgba(200,240,96,0.25); border-radius:12px; padding:10px 14px; display:grid; grid-template-columns:26px 1fr 110px 160px 120px 100px 28px; align-items:center; gap:10px; margin-bottom:7px; }
  .new-task-input { font-size:13px; background:transparent; border:none; outline:none; font-family:'DM Mono',monospace; width:100%; padding:3px 6px; color:var(--text); }
  .new-task-input::placeholder { color:#4a4a5a; }

  .empty { text-align:center; padding:56px 0; color:#5a5a6a; font-size:13px; }
  .spinner { width:26px; height:26px; border:2.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
  .error-box { text-align:center; padding:40px; color:var(--danger); font-size:13px; line-height:1.8; }

  /* Cuotas modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px; }
  .modal { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:28px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; }
  .modal h2 { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:16px; }
  .cuota-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .cuota-num { font-size:11px; color:#5a5a6a; width:24px; flex-shrink:0; }
  .cuota-input { background:#111114; border:1.5px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:13px; padding:7px 10px; border-radius:9px; outline:none; flex:1; }
  .cuota-check { width:22px; height:22px; border-radius:6px; border:2px solid #3e3e50; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:#0e0e10; font-size:11px; font-weight:700; }
  .cuota-check.paid { background:var(--accent); border-color:var(--accent); }
  .modal-footer { display:flex; gap:10px; margin-top:20px; }
  .btn-cancel { flex:1; background:#111114; border:1.5px solid var(--border); color:var(--muted); font-size:13px; padding:11px; border-radius:9px; cursor:pointer; }
  .btn-save { flex:2; background:var(--accent); color:#0e0e10; border:none; font-family:'Syne',sans-serif; font-size:14px; font-weight:800; padding:11px; border-radius:9px; cursor:pointer; }

  .confirm-box { background:var(--surface); border:1.5px solid var(--danger); border-radius:14px; padding:28px; max-width:300px; width:100%; text-align:center; }
  .confirm-box h3 { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; margin-bottom:8px; }
  .confirm-box p { font-size:12px; color:var(--muted); margin-bottom:20px; }
  .btn-confirm-del { flex:1; background:var(--danger); color:#fff; border:none; font-family:'Syne',sans-serif; font-size:13px; font-weight:800; padding:10px; border-radius:9px; cursor:pointer; }

  #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:#222228; border:1.5px solid var(--border); color:var(--text); font-size:13px; padding:12px 22px; border-radius:10px; z-index:999; white-space:nowrap; transition:transform 0.3s ease; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.success { border-color:var(--accent); color:var(--accent); }
  #toast.error { border-color:var(--danger); color:var(--danger); }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div>
      <div class="label">● sincronizado con telegram</div>
      <h1>To-Do<span>.</span></h1>
      <div class="stats">
        <div class="stat"><strong id="s-total">0</strong> tareas</div>
        <div class="stat"><strong id="s-pend">0</strong> pendientes</div>
        <div class="stat"><strong id="s-prog">0</strong> en progreso</div>
        <div class="stat"><strong id="s-done">0</strong> listos</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-icon" onclick="fetchTasks()">↺</button>
      <button class="btn-primary" onclick="showNewRow()">+ Nueva tarea</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('Pendiente',this)">Pendientes</button>
    <button class="filter-btn" onclick="setFilter('En progreso',this)">En progreso</button>
    <button class="filter-btn" onclick="setFilter('Listo',this)">Listos</button>
    <button class="filter-btn" onclick="setSortScore(this)">⚡ Por prioridad</button>
  </div>

  <div class="col-headers">
    <span></span>
    <span>Tarea</span>
    <span>Valor / Esfuerzo</span>
    <span>Estado</span>
    <span>Fecha</span>
    <span>Cuotas</span>
    <span></span>
  </div>

  <div id="newRow" style="display:none">
    <div class="new-task-row">
      <div style="width:22px;height:22px;border-radius:6px;border:2px solid #3e3e50"></div>
      <input class="new-task-input" id="new-nombre" placeholder="Nombre de la tarea..." onkeydown="if(event.key==='Enter')confirmNew();if(event.key==='Escape')hideNewRow()" />
      <div class="ve-cell">
        <span class="ve-label">V</span>
        <input class="ve-input" type="number" id="new-valor" min="1" max="10" value="5" />
        <span class="ve-sep">/</span>
        <span class="ve-label">E</span>
        <input class="ve-input" type="number" id="new-esfuerzo" min="1" max="10" value="5" />
      </div>
      <select class="inline-select" id="new-estado">
        <option>⏳ Pendiente</option><option>🔄 En progreso</option><option>✅ Listo</option>
      </select>
      <input type="date" class="inline-date" id="new-fecha" />
      <button class="btn-primary" style="font-size:12px;padding:5px 12px;grid-column:span 1" onclick="confirmNew()">+ Agregar</button>
      <button class="btn-del" onclick="hideNewRow()">✕</button>
    </div>
  </div>

  <div id="taskList"><div style="text-align:center;padding:48px 0"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Conectando...</div></div></div>
</div>

<!-- Cuotas modal -->
<div class="overlay" id="cuotasModal" style="display:none">
  <div class="modal">
    <h2 id="cuotas-title">Cuotas</h2>
    <div id="cuotas-list"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeCuotas()">Cancelar</button>
      <button class="btn-save" onclick="saveCuotas()">Guardar</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="overlay" id="confirmModal" style="display:none">
  <div class="confirm-box">
    <h3>¿Eliminar tarea?</h3>
    <p>Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_URL="https://tobin-bot-production.up.railway.app";
const HEADERS={"Content-Type":"application/json","x-api-key":"tobin2024"};
let allTasks=[],curFilter="all",sortByScore=false,deletingId=null,cuotasTaskId=null,cuotaData=[];

const S_STYLE={"Pendiente":"background:rgba(120,120,140,0.15);color:#9090b8","En progreso":"background:rgba(240,192,96,0.15);color:#f0c060","Listo":"background:rgba(200,240,96,0.12);color:#c8f060"};
const S_ICON={"Pendiente":"⏳","En progreso":"🔄","Listo":"✅"};
const STATUS=["Pendiente","En progreso","Listo"];

async function api(path,method="GET",body){
  const r=await fetch(`${API_URL}${path}`,{method,headers:HEADERS,body:body?JSON.stringify(body):undefined});
  const d=await r.json(); if(!r.ok) throw new Error(d.error||"Error"); return d;
}

async function fetchTasks(){
  document.getElementById("taskList").innerHTML='<div style="text-align:center;padding:48px 0"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Cargando...</div></div>';
  try{ const d=await api("/tasks"); allTasks=d.tasks||[]; render(); }
  catch(e){ document.getElementById("taskList").innerHTML=`<div class="error-box">⚠️ ${e.message}<br><br><button class="btn-primary" onclick="fetchTasks()">↺ Reintentar</button></div>`; }
}

function scoreColor(s){
  if(s>=7) return {bg:"rgba(200,240,96,0.15)",color:"#c8f060"};
  if(s>=4) return {bg:"rgba(240,192,96,0.15)",color:"#f0c060"};
  return {bg:"rgba(120,120,140,0.12)",color:"#7a7a8a"};
}

function render(){
  let tasks=allTasks.filter(t=>curFilter==="all"||(["Pendiente","En progreso","Listo"].includes(curFilter)?t.estado===curFilter:true));
  if(sortByScore) tasks=[...tasks].sort((a,b)=>((b.valor||5)/(b.esfuerzo||5))-((a.valor||5)/(a.esfuerzo||5)));

  document.getElementById("s-total").textContent=allTasks.length;
  document.getElementById("s-pend").textContent=allTasks.filter(t=>t.estado==="Pendiente").length;
  document.getElementById("s-prog").textContent=allTasks.filter(t=>t.estado==="En progreso").length;
  document.getElementById("s-done").textContent=allTasks.filter(t=>t.estado==="Listo").length;

  if(!tasks.length){document.getElementById("taskList").innerHTML=`<div class="empty">${allTasks.length===0?"No hay tareas. ¡Crea la primera!":"Sin resultados."}</div>`;return;}

  document.getElementById("taskList").innerHTML=tasks.map((t,i)=>{
    const isDone=t.estado==="Listo",isProg=t.estado==="En progreso";
    const v=t.valor||5, e=t.esfuerzo||5;
    const score=Math.round((v/e)*10)/10;
    const sc=scoreColor(score);
    const totalM=(t.cuotaList||[]).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
    const pagM=(t.cuotaList||[]).filter(c=>c.pagada).length;
    const totalC=(t.cuotaList||[]).length;
    return `<div class="task ${isDone?"done":isProg?"in-progress":""}" style="animation-delay:${i*0.02}s">
      <div class="check ${isDone?"done":isProg?"progress":""}" onclick="toggleEstado(${t.id})">${isDone?"✓":isProg?"…":""}</div>
      <input class="task-name" value="${esc(t.nombre)}" onblur="saveField(${t.id},'nombre',this.value)" onkeydown="if(event.key==='Enter')this.blur()" />
      <div class="ve-cell">
        <span class="ve-label">V</span>
        <input class="ve-input" type="number" min="1" max="10" value="${v}" onblur="saveVE(${t.id},'valor',this.value)" onkeydown="if(event.key==='Enter')this.blur()" title="Valor (1-10)" />
        <span class="ve-sep">/</span>
        <span class="ve-label">E</span>
        <input class="ve-input" type="number" min="1" max="10" value="${e}" onblur="saveVE(${t.id},'esfuerzo',this.value)" onkeydown="if(event.key==='Enter')this.blur()" title="Esfuerzo (1-10)" />
        <span class="ve-score" style="background:${sc.bg};color:${sc.color}" title="Prioridad = Valor/Esfuerzo">${score}</span>
      </div>
      <select class="inline-select" onchange="saveField(${t.id},'estado',this.value)" style="${S_STYLE[t.estado]||""};border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;">
        ${STATUS.map(s=>`<option value="${s}" ${t.estado===s?"selected":""}>${S_ICON[s]} ${s}</option>`).join("")}
      </select>
      <input type="date" class="inline-date" value="${t.fecha||""}" onchange="saveField(${t.id},'fecha',this.value)" />
      ${totalM>0
        ?`<span onclick="openCuotas(${t.id})" style="font-size:11px;color:var(--accent2);cursor:pointer;white-space:nowrap">$${totalM.toLocaleString()} ${pagM}/${totalC}</span>`
        :`<span onclick="openCuotas(${t.id})" style="font-size:11px;color:#3a3a4a;cursor:pointer">+ cuotas</span>`}
      <button class="btn-del" onclick="openConfirm(${t.id})">✕</button>
    </div>`;
  }).join("");
}

function setFilter(f,btn){curFilter=f;sortByScore=false;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();}
function setSortScore(btn){sortByScore=true;curFilter="all";document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();}

async function saveField(id,field,value){
  const t=allTasks.find(t=>t.id===id); if(!t||t[field]===value) return;
  t[field]=value; render();
  try{ await api(`/tasks/${id}`,"PATCH",{[field]:value}); }
  catch(e){ showToast(e.message,"error"); fetchTasks(); }
}

async function saveVE(id,field,value){
  const num=Math.max(1,Math.min(10,parseInt(value)||5));
  await saveField(id,field,num);
}

async function toggleEstado(id){
  const t=allTasks.find(t=>t.id===id); if(!t) return;
  await saveField(id,"estado",STATUS[(STATUS.indexOf(t.estado)+1)%STATUS.length]);
}

function showNewRow(){document.getElementById("newRow").style.display="block";setTimeout(()=>document.getElementById("new-nombre").focus(),50);}
function hideNewRow(){document.getElementById("newRow").style.display="none";}

async function confirmNew(){
  const nombre=document.getElementById("new-nombre").value.trim();
  if(!nombre){showToast("Escribe un nombre","error");return;}
  const estadoRaw=document.getElementById("new-estado").value;
  const estado=estadoRaw.replace(/^[^\w]+/,"").trim();
  const body={nombre,estado,valor:parseInt(document.getElementById("new-valor").value)||5,esfuerzo:parseInt(document.getElementById("new-esfuerzo").value)||5,fecha:document.getElementById("new-fecha").value};
  try{
    const d=await api("/tasks","POST",body);
    allTasks.unshift(d.task);hideNewRow();render();showToast("Tarea creada ✓");
    document.getElementById("new-nombre").value="";
    document.getElementById("new-valor").value="5";
    document.getElementById("new-esfuerzo").value="5";
    document.getElementById("new-fecha").value="";
  }catch(e){showToast(e.message,"error");}
}

function openCuotas(id){
  cuotasTaskId=id;
  const t=allTasks.find(t=>t.id===id); if(!t) return;
  cuotaData=(t.cuotaList&&t.cuotaList.length?t.cuotaList:[{n:1,monto:"",pagada:false}]).map(c=>({...c}));
  document.getElementById("cuotas-title").textContent=`Cuotas — ${t.nombre}`;
  renderCuotasList();
  document.getElementById("cuotasModal").style.display="flex";
}
function closeCuotas(){document.getElementById("cuotasModal").style.display="none";}
function renderCuotasList(){
  document.getElementById("cuotas-list").innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:11px;color:var(--muted)">N° cuotas:</span>
      <input type="number" min="1" max="60" value="${cuotaData.length}" style="width:60px;background:#111114;border:1.5px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;padding:5px 8px;border-radius:7px;outline:none;font-size:13px" onchange="resizeCuotas(parseInt(this.value))" />
    </div>
    ${cuotaData.map((c,i)=>`
    <div class="cuota-row">
      <span class="cuota-num">#${c.n}</span>
      <input class="cuota-input" type="number" placeholder="Monto" value="${c.monto||""}" oninput="cuotaData[${i}].monto=this.value" />
      <div class="cuota-check ${c.pagada?"paid":""}" onclick="cuotaData[${i}].pagada=!cuotaData[${i}].pagada;renderCuotasList()">${c.pagada?"✓":""}</div>
    </div>`).join("")}
    <div style="font-size:11px;color:var(--accent2);margin-top:10px">
      Total: $${cuotaData.reduce((s,c)=>s+(parseFloat(c.monto)||0),0).toLocaleString()} · ${cuotaData.filter(c=>c.pagada).length}/${cuotaData.length} pagadas
    </div>`;
}
function resizeCuotas(n){
  n=Math.max(1,Math.min(60,n||1));
  while(cuotaData.length<n) cuotaData.push({n:cuotaData.length+1,monto:"",pagada:false});
  cuotaData=cuotaData.slice(0,n);renderCuotasList();
}
async function saveCuotas(){
  const list=cuotaData.map(c=>({...c,monto:parseFloat(c.monto)||0}));
  try{
    await api(`/tasks/${cuotasTaskId}`,"PATCH",{cuotaList:list});
    const t=allTasks.find(t=>t.id===cuotasTaskId);
    if(t) t.cuotaList=list;
    closeCuotas();render();showToast("Cuotas guardadas ✓");
  }catch(e){showToast(e.message,"error");}
}

function openConfirm(id){deletingId=id;document.getElementById("confirmModal").style.display="flex";}
function closeConfirm(){deletingId=null;document.getElementById("confirmModal").style.display="none";}
async function confirmDelete(){
  try{await api(`/tasks/${deletingId}`,"DELETE");allTasks=allTasks.filter(t=>t.id!==deletingId);closeConfirm();render();showToast("Eliminada");}
  catch(e){showToast(e.message,"error");}
}

let toastTimer;
function showToast(msg,type="success"){const t=document.getElementById("toast");t.textContent=msg;t.className=`show ${type}`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className="",2500);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

document.getElementById("cuotasModal").addEventListener("click",e=>{if(e.target===document.getElementById("cuotasModal"))closeCuotas();});
document.getElementById("confirmModal").addEventListener("click",e=>{if(e.target===document.getElementById("confirmModal"))closeConfirm();});

fetchTasks();
</script>
</body>
</html>
