<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do · Tobin</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8f9fa;--surface:#fff;--surface2:#f1f3f4;--border:#e8eaed;--border2:#dadce0;
    --text:#202124;--muted:#5f6368;--muted2:#9aa0a6;
    --accent:#1a73e8;--accent-hover:#1557b0;--accent-light:#e8f0fe;
    --green:#1e8e3e;--green-light:#e6f4ea;--yellow:#f29900;--yellow-light:#fef7e0;
    --red:#d93025;--red-light:#fce8e6;
    --shadow-sm:0 1px 2px rgba(60,64,67,0.08),0 1px 3px 1px rgba(60,64,67,0.04);
    --shadow:0 1px 3px rgba(60,64,67,0.12),0 2px 6px 2px rgba(60,64,67,0.06);
    --shadow-lg:0 4px 8px rgba(60,64,67,0.12),0 8px 16px rgba(60,64,67,0.08);
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
  button{cursor:pointer;font-family:inherit}
  input,select{font-family:inherit}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:var(--shadow-sm)}
  .topbar-left{display:flex;align-items:center;gap:10px}
  .logo{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
  .logo span{color:var(--accent)}
  .sync-badge{display:flex;align-items:center;gap:6px;background:var(--green-light);color:var(--green);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
  .topbar-right{display:flex;align-items:center;gap:8px}

  .tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:14px;font-weight:500;padding:12px 20px;cursor:pointer;transition:all 0.15s}
  .tab-btn.active{border-bottom-color:var(--accent);color:var(--accent);font-weight:600}

  .container{max-width:920px;margin:0 auto;padding:24px 16px 80px}

  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow-sm)}
  .stat-card .num{font-size:30px;font-weight:700;line-height:1;margin-bottom:4px}
  .stat-card .lbl{font-size:12px;color:var(--muted);font-weight:500}
  .stat-card.c-blue .num{color:var(--accent)}
  .stat-card.c-yellow .num{color:var(--yellow)}
  .stat-card.c-green .num{color:var(--green)}

  .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .filter-chip{background:var(--surface);border:1px solid var(--border2);color:var(--muted);font-size:13px;font-weight:500;padding:6px 16px;border-radius:20px;transition:all 0.15s;white-space:nowrap}
  .filter-chip:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
  .filter-chip.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600}

  .col-headers{display:grid;grid-template-columns:36px 1fr 120px 160px 120px 90px 36px;gap:8px;padding:0 16px 8px}
  .col-headers span{font-size:11px;color:var(--muted2);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}

  .task{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:grid;grid-template-columns:36px 1fr 120px 160px 120px 90px 36px;align-items:center;gap:8px;margin-bottom:6px;box-shadow:var(--shadow-sm);transition:box-shadow 0.15s,border-color 0.15s;animation:fadeUp 0.2s ease both}
  .task:hover{box-shadow:var(--shadow);border-color:var(--border2)}
  .task.done{opacity:0.5}
  .task.in-progress{border-left:3px solid var(--yellow)}

  .check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:white;font-weight:700;transition:all 0.15s;margin:auto}
  .check:hover{border-color:var(--accent);background:var(--accent-light)}
  .check.done{background:var(--green);border-color:var(--green)}
  .check.progress{border-color:var(--yellow)}

  .task-name{font-size:14px;font-weight:500;color:var(--text);background:transparent;border:1px solid transparent;outline:none;width:100%;padding:4px 8px;border-radius:var(--radius-sm);transition:all 0.15s}
  .task-name:hover{background:var(--surface2)}
  .task-name:focus{background:var(--accent-light);border-color:var(--accent)}
  .task.done .task-name{text-decoration:line-through;color:var(--muted)}

  .ve-cell{display:flex;align-items:center;gap:4px}
  .ve-label{font-size:11px;color:var(--muted2);font-weight:600}
  .ve-input{width:34px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:3px 4px;border-radius:6px;outline:none;text-align:center;transition:border-color 0.15s}
  .ve-input:focus{border-color:var(--accent);background:var(--accent-light)}
  .ve-sep{color:var(--border2);font-size:14px}
  .ve-score{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:700;white-space:nowrap;margin-left:2px}

  .inline-select{background:transparent;border:1px solid transparent;font-size:12px;font-weight:600;cursor:pointer;border-radius:20px;padding:4px 8px;outline:none;transition:all 0.15s;-webkit-appearance:none;appearance:none;width:100%}
  .inline-select:hover{border-color:var(--border2)}
  .inline-select option{background:white;color:var(--text);font-weight:500}

  .inline-date{background:transparent;border:1px solid transparent;color:var(--muted);font-size:12px;cursor:pointer;border-radius:var(--radius-sm);padding:4px 6px;outline:none;transition:all 0.15s;width:100%;color-scheme:light}
  .inline-date:hover{background:var(--surface2)}
  .inline-date:focus{background:var(--accent-light);border-color:var(--accent);color:var(--text)}

  .cuota-link{font-size:12px;color:var(--accent);cursor:pointer;white-space:nowrap;font-weight:600}
  .cuota-link.empty{color:var(--muted2);font-weight:500}

  .btn-del{background:none;border:none;color:var(--border2);font-size:16px;padding:4px;border-radius:50%;transition:all 0.15s;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
  .btn-del:hover{background:var(--red-light);color:var(--red)}

  .new-task-row{background:var(--surface);border:2px dashed var(--accent);border-radius:var(--radius);padding:12px 16px;display:grid;grid-template-columns:36px 1fr 120px 160px 120px 90px 36px;align-items:center;gap:8px;margin-bottom:6px}
  .new-input{font-size:14px;font-weight:500;color:var(--text);background:transparent;border:none;outline:none;width:100%;padding:4px 8px}
  .new-input::placeholder{color:var(--muted2);font-weight:400}

  .btn-primary{background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:10px 20px;font-size:14px;font-weight:600;transition:all 0.15s;box-shadow:var(--shadow-sm)}
  .btn-primary:hover{background:var(--accent-hover);box-shadow:var(--shadow)}
  .btn-outline{background:var(--surface);color:var(--muted);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 16px;font-size:14px;font-weight:500;transition:all 0.15s}
  .btn-outline:hover{background:var(--surface2);color:var(--text)}
  .btn-add{background:var(--accent);color:white;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600}

  .empty{text-align:center;padding:64px 0;color:var(--muted2);font-size:14px;line-height:1.8}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}

  .overlay{position:fixed;inset:0;background:rgba(32,33,36,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(2px)}
  .modal{background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
  .modal h2{font-size:20px;font-weight:700;margin-bottom:20px}
  .cuota-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .cuota-num{font-size:12px;color:var(--muted2);width:24px;flex-shrink:0;font-weight:600}
  .cuota-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:8px 12px;border-radius:var(--radius-sm);outline:none}
  .cuota-input:focus{border-color:var(--accent);background:var(--accent-light)}
  .cuota-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:white;font-size:10px;font-weight:700}
  .cuota-check.paid{background:var(--green);border-color:var(--green)}
  .modal-footer{display:flex;gap:10px;margin-top:24px}
  .btn-cancel{flex:1;background:var(--surface2);border:none;color:var(--muted);font-size:14px;font-weight:500;padding:11px;border-radius:var(--radius-sm);cursor:pointer}
  .btn-save{flex:2;background:var(--accent);color:white;border:none;font-size:14px;font-weight:600;padding:11px;border-radius:var(--radius-sm);cursor:pointer}

  .confirm-box{background:var(--surface);border-radius:16px;padding:28px;max-width:320px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
  .confirm-box h3{font-size:18px;font-weight:700;margin-bottom:8px}
  .confirm-box p{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.5}
  .btn-confirm-del{flex:1;background:var(--red);color:white;border:none;font-size:14px;font-weight:600;padding:11px;border-radius:var(--radius-sm);cursor:pointer}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:white;font-size:13px;font-weight:500;padding:12px 24px;border-radius:24px;z-index:999;white-space:nowrap;transition:transform 0.25s ease;box-shadow:var(--shadow-lg)}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.success{background:var(--green)}
  #toast.error{background:var(--red)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">To-Do<span>.</span></div>
    <div class="sync-badge"><div class="sync-dot"></div>Telegram</div>
  </div>
  <div class="topbar-right">
    <button class="btn-outline" id="refresh-btn">↺</button>
    <button class="btn-primary" id="new-task-btn">+ Nueva tarea</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-tareas" onclick="switchTab('tareas')">Tareas</button>
  <button class="tab-btn" id="tab-cuentas" onclick="switchTab('cuentas')">Cuentas</button>
  <button class="tab-btn" id="tab-emails" onclick="switchTab('emails')">Emails</button>
</div>

<div class="container">

  <!-- ── TAREAS ── -->
  <div id="view-tareas">
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="s-total">0</div><div class="lbl">Total</div></div>
      <div class="stat-card c-blue"><div class="num" id="s-pend">0</div><div class="lbl">Pendientes</div></div>
      <div class="stat-card c-yellow"><div class="num" id="s-prog">0</div><div class="lbl">En progreso</div></div>
      <div class="stat-card c-green"><div class="num" id="s-done">0</div><div class="lbl">Completadas</div></div>
    </div>
    <div class="toolbar">
      <button class="filter-chip active" onclick="setFilter('all',this)">Todas</button>
      <button class="filter-chip" onclick="setFilter('Pendiente',this)">Pendientes</button>
      <button class="filter-chip" onclick="setFilter('En progreso',this)">En progreso</button>
      <button class="filter-chip" onclick="setFilter('Listo',this)">Completadas</button>
      <button class="filter-chip" onclick="setSortScore(this)">⚡ Por prioridad</button>
    </div>
    <div class="col-headers">
      <span></span><span>Tarea</span><span>Valor / Esfuerzo</span><span>Estado</span><span>Fecha</span><span>Cuotas</span><span></span>
    </div>
    <div id="newRow" style="display:none">
      <div class="new-task-row">
        <div style="width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);margin:auto"></div>
        <input class="new-input" id="new-nombre" placeholder="Nombre de la tarea..." onkeydown="if(event.key==='Enter')confirmNew();if(event.key==='Escape')hideNewRow()" />
        <div class="ve-cell">
          <span class="ve-label">V</span><input class="ve-input" type="number" id="new-valor" min="1" max="10" value="5" />
          <span class="ve-sep">/</span>
          <span class="ve-label">E</span><input class="ve-input" type="number" id="new-esfuerzo" min="1" max="10" value="5" />
        </div>
        <select class="inline-select" id="new-estado" style="background:var(--accent-light);color:var(--accent);border-color:var(--accent)">
          <option value="Pendiente">⏳ Pendiente</option>
          <option value="En progreso">🔄 En progreso</option>
          <option value="Listo">✅ Listo</option>
        </select>
        <input type="date" class="inline-date" id="new-fecha" />
        <button class="btn-add" onclick="confirmNew()">Agregar</button>
        <button class="btn-del" onclick="hideNewRow()">✕</button>
      </div>
    </div>
    <div id="taskList">
      <div style="text-align:center;padding:64px 0"><div class="spinner"></div><div style="color:var(--muted);font-size:14px">Conectando...</div></div>
    </div>
  </div>


  <!-- ── EMAILS ── -->
  <div id="view-emails" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="filter-chip active" id="ef-all"     onclick="setEmailFilter('pending',this)">Todos</button>
        <button class="filter-chip" id="ef-urgente"  onclick="setEmailFilter('urgente',this)">🔴 Priorizado</button>
        <button class="filter-chip" id="ef-util"     onclick="setEmailFilter('util',this)">🔵 Útil</button>
        <button class="filter-chip" id="ef-poco"     onclick="setEmailFilter('poco_util',this)">⚪ Poco útil</button>
        <button class="filter-chip" id="ef-spam"     onclick="setEmailFilter('spam',this)">⛔ Spam</button>
        <button class="filter-chip" id="ef-approved" onclick="setEmailFilter('approved',this)">✅ Ejecutados</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-outline" onclick="emailSelectAll()">Seleccionar todo</button>
        <button class="btn-primary" onclick="executeSelected()">▶ Ejecutar seleccionados</button>
      </div>
    </div>

    <div class="stats-row" style="margin-bottom:20px">
      <div class="stat-card"><div class="num" id="e-total">0</div><div class="lbl">Total</div></div>
      <div class="stat-card" style="border-left:3px solid #d93025"><div class="num" id="e-urgentes" style="color:#d93025">0</div><div class="lbl">Priorizado</div></div>
      <div class="stat-card" style="border-left:3px solid #1a73e8"><div class="num" id="e-utiles" style="color:#1a73e8">0</div><div class="lbl">Útiles</div></div>
      <div class="stat-card" style="border-left:3px solid #d93025"><div class="num" id="e-spam" style="color:#9aa0a6">0</div><div class="lbl">Spam</div></div>
    </div>

    <!-- email col headers removed, now inline -->
    <div id="emailList"><div style="text-align:center;padding:48px 0"><div class="spinner"></div></div></div>
  </div>

  <!-- Email detail modal -->
  <div class="overlay" id="emailModal" style="display:none">
    <div class="modal" style="max-width:600px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div>
          <h2 id="em-subject" style="font-size:18px;margin-bottom:4px"></h2>
          <p id="em-from" style="font-size:13px;color:var(--muted)"></p>
        </div>
        <button class="btn-del" onclick="closeEmailModal()">✕</button>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:16px">
        <p id="em-snippet" style="font-size:13px;color:var(--muted);line-height:1.6"></p>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px">Clasificación</label>
          <select id="em-classification" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit">
            <option value="urgente">🔴 Priorizado</option>
            <option value="util">🔵 Útil</option>
            <option value="poco_util">⚪ Poco útil</option>
            <option value="spam">⛔ Spam</option>
          </select>
        </div>
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px">Acción</label>
          <select id="em-action" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit">
            <option value="responder">✍️ Responder (borrador)</option>
            <option value="etiquetar_util">🔵 Etiquetar útil</option>
            <option value="archivar">📁 Archivar</option>
            <option value="marcar_spam">⛔ Marcar spam</option>
          </select>
        </div>
      </div>
      <div id="em-draft-section">
        <label style="font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px">Borrador de respuesta</label>
        <textarea id="em-draft" style="width:100%;height:140px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;line-height:1.6;outline:none;resize:vertical;font-family:inherit" placeholder="Sin borrador..."></textarea>
      </div>
      <div style="font-size:12px;color:var(--muted2);margin:8px 0 16px;padding:8px 12px;background:var(--accent-light);border-radius:6px" id="em-reason"></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeEmailModal()">Cancelar</button>
        <button class="btn-save" onclick="saveEmailCorrection()">Guardar corrección</button>
      </div>
    </div>
  </div>

  <!-- ── CUENTAS ── -->
  <div id="view-cuentas" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
      <select id="filter-mes" onchange="renderCuentas()" style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500;color:var(--text);outline:none;cursor:pointer">
        <option value="1">Enero</option><option value="2">Febrero</option><option value="3" selected>Marzo</option>
        <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
        <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
        <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
      </select>
      <select id="filter-anio" onchange="renderCuentas()" style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500;color:var(--text);outline:none;cursor:pointer">
        <option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option>
      </select>
      <select id="filter-cestado" onchange="renderCuentas()" style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500;color:var(--text);outline:none;cursor:pointer">
        <option value="all">Todos</option><option value="Por pagar">Por pagar</option><option value="Pagado">Pagado</option>
      </select>
      <button class="btn-primary" style="margin-left:auto" onclick="seedMonth()">+ Generar mes</button>
    </div>
    <div class="stats-row" style="margin-bottom:20px">
      <div class="stat-card"><div class="num" id="c-total">-</div><div class="lbl">Total del mes</div></div>
      <div class="stat-card c-green"><div class="num" id="c-pagadas">0</div><div class="lbl">Pagadas</div></div>
      <div class="stat-card c-yellow"><div class="num" id="c-pagar">0</div><div class="lbl">Por pagar</div></div>
      <div class="stat-card c-blue"><div class="num" id="c-pendiente">-</div><div class="lbl">Monto pendiente</div></div>
    </div>
    <div class="col-headers" style="grid-template-columns:1fr 140px 140px 90px 28px">
      <span>Cuenta</span><span>Monto</span><span>Estado</span><span>Variación</span><span></span>
    </div>
    <div id="cuentasList"></div>
  </div>

</div>

<!-- Modals -->
<div class="overlay" id="cuotasModal" style="display:none">
  <div class="modal">
    <h2 id="cuotas-title">Cuotas</h2>
    <div id="cuotas-list"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeCuotas()">Cancelar</button>
      <button class="btn-save" onclick="saveCuotas()">Guardar</button>
    </div>
  </div>
</div>
<div class="overlay" id="confirmModal" style="display:none">
  <div class="confirm-box">
    <h3>¿Eliminar?</h3>
    <p>Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const API_URL="https://tobin-bot-production.up.railway.app";
const HEADERS={"Content-Type":"application/json","x-api-key":"tobin2024"};

// ── Tab switching ──────────────────────────────────────────────
function switchTab(tab) {
  ['tareas','cuentas','emails'].forEach(function(t) {
    document.getElementById('view-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab-'+t).className = 'tab-btn' + (t===tab ? ' active' : '');
  });
  document.getElementById('refresh-btn').onclick = tab==='tareas' ? fetchTasks : tab==='cuentas' ? fetchCuentas : fetchEmails;
  document.getElementById('new-task-btn').style.display = tab==='tareas' ? 'block' : 'none';
  if(tab==='emails') fetchEmails();
  if(tab==='cuentas') fetchCuentas();
}
document.getElementById("refresh-btn").onclick = fetchTasks;
document.getElementById("new-task-btn").onclick = showNewRow;

// ── Toast ──────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type="success"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className="show "+type;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className="",2500);
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

async function api(path,method="GET",body){
  const r=await fetch(`${API_URL}${path}`,{method,headers:HEADERS,body:body?JSON.stringify(body):undefined});
  const d=await r.json();if(!r.ok)throw new Error(d.error||"Error");return d;
}

// ══════════════════════════════════════════════════════════════
// TAREAS
// ══════════════════════════════════════════════════════════════
let allTasks=[],curFilter="all",sortByScore=false,deletingId=null,cuotasTaskId=null,cuotaData=[];
const STATUS=["Pendiente","En progreso","Listo"];
const S_ICON={"Pendiente":"⏳","En progreso":"🔄","Listo":"✅"};
const S_STYLE={"Pendiente":"background:#e8f0fe;color:#1a73e8;","En progreso":"background:#fef7e0;color:#f29900;","Listo":"background:#e6f4ea;color:#1e8e3e;"};

async function fetchTasks(){
  document.getElementById("taskList").innerHTML='<div style="text-align:center;padding:64px 0"><div class="spinner"></div><div style="color:var(--muted);font-size:14px">Cargando...</div></div>';
  try{const d=await api("/tasks");allTasks=d.tasks||[];renderTasks();}
  catch(e){document.getElementById("taskList").innerHTML=`<div class="empty">⚠️ ${e.message}<br><br><button class="btn-primary" onclick="fetchTasks()" style="margin-top:12px">↺ Reintentar</button></div>`;}
}

function scoreStyle(s){
  if(s>=2)return"background:#e6f4ea;color:#1e8e3e";
  if(s>=1)return"background:#fef7e0;color:#f29900";
  return"background:#f1f3f4;color:#5f6368";
}

function renderTasks(){
  let tasks=allTasks.filter(t=>curFilter==="all"||(["Pendiente","En progreso","Listo"].includes(curFilter)?t.estado===curFilter:true));
  if(sortByScore)tasks=[...tasks].sort((a,b)=>((b.valor||5)/(b.esfuerzo||5))-((a.valor||5)/(a.esfuerzo||5)));
  tasks.sort((a,b)=>(a.estado==="Listo"?1:0)-(b.estado==="Listo"?1:0));
  document.getElementById("s-total").textContent=allTasks.length;
  document.getElementById("s-pend").textContent=allTasks.filter(t=>t.estado==="Pendiente").length;
  document.getElementById("s-prog").textContent=allTasks.filter(t=>t.estado==="En progreso").length;
  document.getElementById("s-done").textContent=allTasks.filter(t=>t.estado==="Listo").length;
  if(!tasks.length){document.getElementById("taskList").innerHTML=`<div class="empty">${allTasks.length===0?"No hay tareas. ¡Crea la primera!":"Sin resultados."}</div>`;return;}
  document.getElementById("taskList").innerHTML=tasks.map((t,i)=>{
    const isDone=t.estado==="Listo",isProg=t.estado==="En progreso";
    const v=t.valor||5,e=t.esfuerzo||5,score=Math.round((v/e)*10)/10;
    const totalM=(t.cuotaList||[]).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
    const pagM=(t.cuotaList||[]).filter(c=>c.pagada).length,totalC=(t.cuotaList||[]).length;
    return `<div class="task ${isDone?"done":isProg?"in-progress":""}" style="animation-delay:${i*0.02}s">
      <div class="check ${isDone?"done":isProg?"progress":""}" onclick="toggleEstado(${t.id})">${isDone?"✓":isProg?"–":""}</div>
      <input class="task-name" value="${esc(t.nombre)}" onblur="saveField(${t.id},'nombre',this.value)" onkeydown="if(event.key==='Enter')this.blur()" />
      <div class="ve-cell">
        <span class="ve-label">V</span><input class="ve-input" type="number" min="1" max="10" value="${v}" onblur="saveVE(${t.id},'valor',this.value)" onkeydown="if(event.key==='Enter')this.blur()" />
        <span class="ve-sep">/</span>
        <span class="ve-label">E</span><input class="ve-input" type="number" min="1" max="10" value="${e}" onblur="saveVE(${t.id},'esfuerzo',this.value)" onkeydown="if(event.key==='Enter')this.blur()" />
        <span class="ve-score" style="${scoreStyle(score)}">${score}</span>
      </div>
      <select class="inline-select" onchange="saveField(${t.id},'estado',this.value)" style="${S_STYLE[t.estado]||""}">
        ${STATUS.map(s=>`<option value="${s}" ${t.estado===s?"selected":""}>${S_ICON[s]} ${s}</option>`).join("")}
      </select>
      <input type="date" class="inline-date" value="${t.fecha||""}" onchange="saveField(${t.id},'fecha',this.value)" />
      ${totalM>0?`<span class="cuota-link" onclick="openCuotas(${t.id})">$${totalM.toLocaleString()} ${pagM}/${totalC}</span>`:`<span class="cuota-link empty" onclick="openCuotas(${t.id})">+ cuotas</span>`}
      <button class="btn-del" onclick="openConfirm('task',${t.id})">✕</button>
    </div>`;
  }).join("");
}

function setFilter(f,btn){curFilter=f;sortByScore=false;document.querySelectorAll(".filter-chip").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderTasks();}
function setSortScore(btn){sortByScore=true;curFilter="all";document.querySelectorAll(".filter-chip").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderTasks();}

async function saveField(id,field,value){
  const t=allTasks.find(t=>t.id===id);if(!t||t[field]===value)return;
  t[field]=value;renderTasks();
  try{await api(`/tasks/${id}`,"PATCH",{[field]:value});}
  catch(e){showToast(e.message,"error");fetchTasks();}
}
async function saveVE(id,field,value){await saveField(id,field,Math.max(1,Math.min(10,parseInt(value)||5)));}
async function toggleEstado(id){const t=allTasks.find(t=>t.id===id);if(!t)return;await saveField(id,"estado",STATUS[(STATUS.indexOf(t.estado)+1)%STATUS.length]);}

function showNewRow(){document.getElementById("newRow").style.display="block";setTimeout(()=>document.getElementById("new-nombre").focus(),50);}
function hideNewRow(){document.getElementById("newRow").style.display="none";}
async function confirmNew(){
  const nombre=document.getElementById("new-nombre").value.trim();
  if(!nombre){showToast("Escribe un nombre","error");return;}
  const body={nombre,estado:document.getElementById("new-estado").value,valor:parseInt(document.getElementById("new-valor").value)||5,esfuerzo:parseInt(document.getElementById("new-esfuerzo").value)||5,fecha:document.getElementById("new-fecha").value};
  try{
    const d=await api("/tasks","POST",body);allTasks.unshift(d.task);hideNewRow();renderTasks();showToast("Tarea creada ✓");
    document.getElementById("new-nombre").value="";document.getElementById("new-valor").value="5";document.getElementById("new-esfuerzo").value="5";document.getElementById("new-fecha").value="";
  }catch(e){showToast(e.message,"error");}
}

function openCuotas(id){
  cuotasTaskId=id;const t=allTasks.find(t=>t.id===id);if(!t)return;
  cuotaData=(t.cuotaList&&t.cuotaList.length?t.cuotaList:[{n:1,monto:"",pagada:false}]).map(c=>({...c}));
  document.getElementById("cuotas-title").textContent="Cuotas — "+t.nombre;
  renderCuotasList();document.getElementById("cuotasModal").style.display="flex";
}
function closeCuotas(){document.getElementById("cuotasModal").style.display="none";}
function renderCuotasList(){
  document.getElementById("cuotas-list").innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <span style="font-size:13px;color:var(--muted);font-weight:500">N° cuotas:</span>
      <input type="number" min="1" max="60" value="${cuotaData.length}" style="width:64px;background:var(--surface2);border:1px solid var(--border);padding:6px 10px;border-radius:var(--radius-sm);outline:none;font-size:14px;font-family:inherit" onchange="resizeCuotas(parseInt(this.value))" />
    </div>
    ${cuotaData.map((c,i)=>`<div class="cuota-row">
      <span class="cuota-num">#${c.n}</span>
      <input class="cuota-input" type="number" placeholder="Monto" value="${c.monto||""}" oninput="cuotaData[${i}].monto=this.value" />
      <div class="cuota-check ${c.pagada?"paid":""}" onclick="cuotaData[${i}].pagada=!cuotaData[${i}].pagada;renderCuotasList()">${c.pagada?"✓":""}</div>
    </div>`).join("")}
    <div style="font-size:13px;color:var(--green);margin-top:12px;font-weight:600">
      Total: $${cuotaData.reduce((s,c)=>s+(parseFloat(c.monto)||0),0).toLocaleString()} · ${cuotaData.filter(c=>c.pagada).length}/${cuotaData.length} pagadas
    </div>`;
}
function resizeCuotas(n){
  n=Math.max(1,Math.min(60,n||1));
  while(cuotaData.length<n)cuotaData.push({n:cuotaData.length+1,monto:"",pagada:false});
  cuotaData=cuotaData.slice(0,n);renderCuotasList();
}
async function saveCuotas(){
  const list=cuotaData.map(c=>({...c,monto:parseFloat(c.monto)||0}));
  try{await api(`/tasks/${cuotasTaskId}`,"PATCH",{cuotaList:list});const t=allTasks.find(t=>t.id===cuotasTaskId);if(t)t.cuotaList=list;closeCuotas();renderTasks();showToast("Cuotas guardadas ✓");}
  catch(e){showToast(e.message,"error");}
}

// ══════════════════════════════════════════════════════════════
// CUENTAS
// ══════════════════════════════════════════════════════════════
const CUENTAS_NAMES=["Greyhound GG","Cachagua GG","Carelmapu","Hipotecario Cachagua","Hipotecario Ofis","Autopase","Gas Cachagua","Agua Cachagua","Luz Cachagua","Luz Stgo","Gas Stgo","Agua Stgo","Club de Golf Los Leones","Club de Golf Cachagua","Jardinero Cachagua","TC 1","TC 2","TC Int","VMA","Seduc","Gabriel","Mai","Jessica","Seguros Autos","Contribuciones"];
let allCuentas=[];

async function fetchCuentas(){
  document.getElementById("cuentasList").innerHTML='<div style="text-align:center;padding:48px 0"><div class="spinner"></div></div>';
  try{const d=await api("/cuentas");allCuentas=d.cuentas||[];renderCuentas();}
  catch(e){showToast("Error cargando cuentas","error");}
}

function variacion(cuenta){
  const prev=allCuentas.find(c=>c.nombre===cuenta.nombre&&((cuenta.mes===1&&c.mes===12&&c.anio===cuenta.anio-1)||(cuenta.mes>1&&c.mes===cuenta.mes-1&&c.anio===cuenta.anio)));
  if(!prev||!prev.monto||!cuenta.monto)return null;
  return((cuenta.monto-prev.monto)/prev.monto*100).toFixed(1);
}

function renderCuentas(){
  const mes=parseInt(document.getElementById("filter-mes").value);
  const anio=parseInt(document.getElementById("filter-anio").value);
  const est=document.getElementById("filter-cestado").value;
  let rows=allCuentas.filter(c=>c.mes===mes&&c.anio===anio&&(est==="all"||c.estado===est));
  const total=rows.reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const pagadas=rows.filter(c=>c.estado==="Pagado").length;
  const porPagar=rows.filter(c=>c.estado==="Por pagar").length;
  const montoPend=rows.filter(c=>c.estado==="Por pagar").reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  document.getElementById("c-total").textContent="$"+total.toLocaleString("es-CL");
  document.getElementById("c-pagadas").textContent=pagadas;
  document.getElementById("c-pagar").textContent=porPagar;
  document.getElementById("c-pendiente").textContent="$"+montoPend.toLocaleString("es-CL");
  if(!rows.length){
    const mNombre=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][mes-1];
    document.getElementById("cuentasList").innerHTML=`<div class="empty">No hay cuentas para ${mNombre} ${anio}.<br><br><button class="btn-primary" onclick="seedMonth()" style="margin-top:12px">+ Generar cuentas del mes</button></div>`;
    return;
  }
  document.getElementById("cuentasList").innerHTML=rows.map(c=>{
    const v=variacion(c);
    const variHtml=v===null?'<span style="color:var(--muted2);font-size:12px">—</span>':`<span style="font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px;background:${parseFloat(v)>0?"#fce8e6":"#e6f4ea"};color:${parseFloat(v)>0?"#d93025":"#1e8e3e"}">${parseFloat(v)>0?"+":""}${v}%</span>`;
    const estStyle=c.estado==="Pagado"?"background:#e6f4ea;color:#1e8e3e":"background:#fef7e0;color:#f29900";
    return `<div class="task" style="grid-template-columns:1fr 140px 140px 90px 28px;animation-delay:0s">
      <span style="font-size:14px;font-weight:500;padding:4px 8px">${esc(c.nombre)}</span>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:12px;color:var(--muted2)">$</span>
        <input type="number" value="${c.monto||""}" placeholder="0"
          style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:13px;font-weight:600;outline:none;font-family:inherit;width:100%"
          onblur="saveCuenta(${c.id},'monto',parseFloat(this.value)||0)"
          onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
      <select onchange="saveCuenta(${c.id},'estado',this.value)"
        style="${estStyle};border:none;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;outline:none;width:100%;-webkit-appearance:none">
        <option value="Por pagar" ${c.estado==="Por pagar"?"selected":""}>⏳ Por pagar</option>
        <option value="Pagado" ${c.estado==="Pagado"?"selected":""}>✅ Pagado</option>
      </select>
      ${variHtml}
      <button class="btn-del" onclick="openConfirm('cuenta',${c.id})">✕</button>
    </div>`;
  }).join("");
}

async function saveCuenta(id,field,value){
  const c=allCuentas.find(c=>c.id===id);if(!c)return;
  c[field]=value;renderCuentas();
  try{await api(`/cuentas/${id}`,"PATCH",{[field]:value});}
  catch(e){showToast(e.message,"error");}
}

async function seedMonth(){
  const mes=parseInt(document.getElementById("filter-mes").value);
  const anio=parseInt(document.getElementById("filter-anio").value);
  showToast("Generando cuentas...");
  for(const nombre of CUENTAS_NAMES){
    const exists=allCuentas.find(c=>c.nombre===nombre&&c.mes===mes&&c.anio===anio);
    if(!exists){
      try{
        const d=await api("/cuentas","POST",{nombre,mes,anio,monto:0,estado:"Por pagar"});
        allCuentas.push(d.cuenta);
      }catch(e){}
    }
  }
  renderCuentas();showToast("Cuentas generadas ✓");
}

// ── Confirm / Delete ──────────────────────────────────────────
let deletingType=null;
function openConfirm(type,id){deletingType=type;deletingId=id;document.getElementById("confirmModal").style.display="flex";}
function closeConfirm(){deletingId=null;deletingType=null;document.getElementById("confirmModal").style.display="none";}
async function confirmDelete(){
  try{
    if(deletingType==="task"){
      await api(`/tasks/${deletingId}`,"DELETE");allTasks=allTasks.filter(t=>t.id!==deletingId);renderTasks();
    } else {
      await api(`/cuentas/${deletingId}`,"DELETE");allCuentas=allCuentas.filter(c=>c.id!==deletingId);renderCuentas();
    }
    closeConfirm();showToast("Eliminado");
  }catch(e){showToast(e.message,"error");}
}

document.getElementById("cuotasModal").addEventListener("click",e=>{if(e.target===document.getElementById("cuotasModal"))closeCuotas();});
document.getElementById("confirmModal").addEventListener("click",e=>{if(e.target===document.getElementById("confirmModal"))closeConfirm();});

fetchTasks();

// ── EMAIL MODULE ──
// Email module - inline in index.html

const CLS_STYLE = {
  urgente:   { bg: "#fce8e6", color: "#d93025", icon: "🔴", label: "Priorizado" },
  util:      { bg: "#e8f0fe", color: "#1a73e8", icon: "🔵", label: "Útil" },
  poco_util: { bg: "#f1f3f4", color: "#5f6368", icon: "⚪", label: "Poco útil" },
  spam:      { bg: "#f1f3f4", color: "#9aa0a6", icon: "⛔", label: "Spam" }
};
const ACTION_LABELS = {
  responder:      "✍️ Responder",
  etiquetar_util: "🔵 Etiquetar",
  archivar:       "📁 Archivar",
  marcar_spam:    "⛔ Spam"
};

let allEmails = [], emailFilter = "pending", currentEmailId = null;

async function fetchEmails() {
  document.getElementById("emailList").innerHTML = '<div style="text-align:center;padding:48px 0"><div class="spinner"></div></div>';
  try {
    const d = await api("/emails?status=pending");
    allEmails = d.emails || [];
    renderEmails();
  } catch(e) { showToast("Error cargando emails", "error"); }
}

function setEmailFilter(filter, btn) {
  emailFilter = filter;
  document.querySelectorAll("#view-emails .filter-chip").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderEmails();
}

function renderEmails() {
  let rows = allEmails;
  if (emailFilter === "approved") rows = allEmails.filter(e => e.status === "approved");
  else if (emailFilter !== "pending") rows = allEmails.filter(e => e.classification === emailFilter && e.status === "pending");

  document.getElementById("e-total").textContent    = allEmails.length;
  document.getElementById("e-urgentes").textContent = allEmails.filter(e => e.classification === "urgente").length;
  document.getElementById("e-utiles").textContent   = allEmails.filter(e => e.classification === "util").length;
  document.getElementById("e-spam").textContent     = allEmails.filter(e => e.classification === "spam").length;

  if (!rows.length) {
    document.getElementById("emailList").innerHTML = "<div class=\"empty\">No hay emails en esta categoría.</div>";
    return;
  }

  document.getElementById("emailList").innerHTML = rows.map((e, i) => {
    const cls = CLS_STYLE[e.classification] || CLS_STYLE.poco_util;
    const correction = e.user_correction ? JSON.parse(e.user_correction) : null;
    const clsFinal = correction ? (CLS_STYLE[correction.classification] || cls) : cls;
    const actionLabel = ACTION_LABELS[correction ? correction.action : e.action] || e.action;
    const hasDraft = e.draft_reply || (correction && correction.draft_reply);
    const fromClean = (e.from_email || "").replace(/<.*>/, "").trim();
    const isUrgent = e.classification === "urgente";

    return "<div style=\"background:var(--surface);border:1px solid " + (isUrgent ? "#f5c6c3" : "var(--border)") + ";border-left:3px solid " + clsFinal.color + ";border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow-sm);animation:fadeUp 0.2s ease both;animation-delay:" + (i*0.02) + "s\">" +
      "<div style=\"display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer\" onclick=\"toggleEmail('" + e.gmail_id + "')\">" +
        "<input type=\"checkbox\" class=\"email-cb\" data-id=\"" + e.gmail_id + "\" onclick=\"event.stopPropagation()\" style=\"width:16px;height:16px;cursor:pointer;margin-top:2px;flex-shrink:0\" />" +
        "<div style=\"flex:1;min-width:0\">" +
          "<div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px\">" +
            "<span style=\"font-size:14px;font-weight:" + (isUrgent ? "700" : "500") + ";color:var(--text)\">" + esc(e.subject || "Sin asunto") + "</span>" +
            "<span style=\"font-size:11px;font-weight:600;padding:2px 10px;border-radius:10px;background:" + clsFinal.bg + ";color:" + clsFinal.color + ";white-space:nowrap\">" + clsFinal.icon + " " + (clsFinal.label || (correction ? correction.classification : e.classification)) + "</span>" +
            (hasDraft ? "<span style=\"font-size:10px;background:#e8f0fe;color:#1a73e8;padding:2px 7px;border-radius:4px;font-weight:600\">✍️ draft</span>" : "") +
          "</div>" +
          "<div style=\"font-size:12px;color:var(--muted);margin-bottom:4px\">" + esc(fromClean) + "</div>" +
          "<div style=\"font-size:12px;color:var(--muted2);line-height:1.4\">" + esc((e.snippet || "").slice(0, 120)) + (e.snippet && e.snippet.length > 120 ? "..." : "") + "</div>" +
        "</div>" +
        "<div style=\"display:flex;align-items:center;gap:8px;flex-shrink:0\">" +
          "<span style=\"font-size:11px;color:var(--muted)\">" + actionLabel + "</span>" +
          "<button class=\"btn-del\" onclick=\"event.stopPropagation();skipEmail('" + e.gmail_id + "')\" style=\"flex-shrink:0\">✕</button>" +
        "</div>" +
      "</div>" +
      "<div id=\"exp-" + e.gmail_id + "\" style=\"display:none;border-top:1px solid var(--border);padding:16px;background:var(--surface2)\">" +
        "<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px\">" +
          "<div>" +
            "<label style=\"font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px\">Clasificación</label>" +
            "<select onchange=\"updateEmailInline('" + e.gmail_id + "','classification',this.value)\" style=\"width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;outline:none;font-family:inherit\">" +
              "<option value=\"urgente\" " + (((correction ? correction.classification : e.classification)==="urgente") ? "selected" : "") + ">🔴 Priorizado</option>" +
              "<option value=\"util\" " + (((correction ? correction.classification : e.classification)==="util") ? "selected" : "") + ">🔵 Útil</option>" +
              "<option value=\"poco_util\" " + (((correction ? correction.classification : e.classification)==="poco_util") ? "selected" : "") + ">⚪ Poco útil</option>" +
              "<option value=\"spam\" " + (((correction ? correction.classification : e.classification)==="spam") ? "selected" : "") + ">⛔ Spam</option>" +
            "</select>" +
          "</div>" +
          "<div>" +
            "<label style=\"font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px\">Acción</label>" +
            "<select onchange=\"updateEmailInline('" + e.gmail_id + "','action',this.value)\" style=\"width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;outline:none;font-family:inherit\">" +
              "<option value=\"responder\" " + (((correction ? correction.action : e.action)==="responder") ? "selected" : "") + ">✍️ Responder</option>" +
              "<option value=\"etiquetar_util\" " + (((correction ? correction.action : e.action)==="etiquetar_util") ? "selected" : "") + ">🔵 Etiquetar útil</option>" +
              "<option value=\"archivar\" " + (((correction ? correction.action : e.action)==="archivar") ? "selected" : "") + ">📁 Archivar</option>" +
              "<option value=\"marcar_spam\" " + (((correction ? correction.action : e.action)==="marcar_spam") ? "selected" : "") + ">⛔ Spam</option>" +
            "</select>" +
          "</div>" +
        "</div>" +
        (hasDraft ? "<div><label style=\"font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px\">Borrador de respuesta</label><textarea onblur=\"updateEmailInline('" + e.gmail_id + "','draft_reply',this.value)\" style=\"width:100%;height:120px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;line-height:1.6;outline:none;resize:vertical;font-family:inherit\">" + esc(correction ? (correction.draft_reply || "") : (e.draft_reply || "")) + "</textarea></div>" : "") +
        (e.ai_reason ? "<div style=\"font-size:12px;color:var(--muted2);margin-top:10px;padding:8px 12px;background:var(--accent-light);border-radius:6px\">🤖 " + esc(e.ai_reason) + "</div>" : "") +
        "<div style=\"display:flex;gap:8px;margin-top:12px\">" +
          "<button class=\"btn-outline\" style=\"font-size:12px;padding:6px 14px\" onclick=\"skipEmail('" + e.gmail_id + "')\">Omitir</button>" +
          "<button class=\"btn-primary\" style=\"font-size:12px;padding:6px 14px\" onclick=\"executeSingle('" + e.gmail_id + "')\">▶ Ejecutar este</button>" +
        "</div>" +
      "</div>" +
    "</div>";
  }).join("");
}

function toggleEmail(gmailId) {
  const el = document.getElementById("exp-" + gmailId);
  if (el) el.style.display = el.style.display === "none" ? "block" : "none";
}

async function updateEmailInline(gmailId, field, value) {
  const email = allEmails.find(e => e.gmail_id === gmailId);
  if (!email) return;
  const correction = email.user_correction ? JSON.parse(email.user_correction) : {
    classification: email.classification,
    action: email.action,
    draft_reply: email.draft_reply
  };
  correction[field] = value;

  // Auto-set sensible action when classification changes
  if (field === "classification") {
    if (value === "urgente")    correction.action = "responder";
    if (value === "util")       correction.action = "etiquetar_util";
    if (value === "poco_util")  correction.action = "archivar";
    if (value === "spam")       correction.action = "marcar_spam";
  }

  email.user_correction = JSON.stringify(correction);
  try {
    await api("/emails/" + gmailId, "PATCH", { user_correction: JSON.stringify(correction) });
    showToast("✓ Guardado");
    renderEmails();
    setTimeout(() => {
      const el = document.getElementById("exp-" + gmailId);
      if (el) el.style.display = "block";
    }, 50);
  } catch(e) { showToast(e.message, "error"); }
}

async function executeSingle(gmailId) {
  showToast("Ejecutando...");
  try {
    const r = await api("/emails/execute", "POST", { gmailIds: [gmailId] });
    showToast("✓ Ejecutado");
    allEmails = allEmails.map(e => e.gmail_id === gmailId ? {...e, status:"approved"} : e);
    renderEmails();
  } catch(e) { showToast(e.message, "error"); }
}

function emailSelectAll() {
  const cbs = document.querySelectorAll(".email-cb");
  const allChecked = [...cbs].every(c => c.checked);
  cbs.forEach(c => c.checked = !allChecked);
}

async function executeSelected() {
  const selected = [...document.querySelectorAll(".email-cb:checked")].map(c => c.dataset.id);
  if (!selected.length) { showToast("Selecciona al menos un email", "error"); return; }
  showToast("Ejecutando " + selected.length + " acciones...");
  try {
    const r = await api("/emails/execute", "POST", { gmailIds: selected });
    showToast(`✓ ${r.done} ejecutados`);
    allEmails = allEmails.map(e => selected.includes(e.gmail_id) ? {...e, status:"approved"} : e);
    renderEmails();
  } catch(e) { showToast(e.message, "error"); }
}

async function skipEmail(gmailId) {
  await api("/emails/skip", "POST", { gmailIds: [gmailId] });
  allEmails = allEmails.filter(e => e.gmail_id !== gmailId);
  renderEmails();
  showToast("Email omitido");
}

function openEmailModal(gmailId) {
  const email = allEmails.find(e => e.gmail_id === gmailId);
  if (!email) return;
  const correction = email.user_correction ? JSON.parse(email.user_correction) : null;
  currentEmailId = gmailId;
  document.getElementById("em-subject").textContent = email.subject || "Sin asunto";
  document.getElementById("em-from").textContent    = email.from_email || "";
  document.getElementById("em-snippet").textContent = email.snippet || "";
  document.getElementById("em-classification").value = correction?.classification || email.classification || "poco_util";
  document.getElementById("em-action").value         = correction?.action || email.action || "archivar";
  document.getElementById("em-draft").value          = correction?.draft_reply || email.draft_reply || "";
  document.getElementById("em-reason").textContent   = "🤖 " + (email.ai_reason || "Sin explicación");
  document.getElementById("emailModal").style.display = "flex";
}

function closeEmailModal() { document.getElementById("emailModal").style.display = "none"; currentEmailId = null; }

async function saveEmailCorrection() {
  if (!currentEmailId) return;
  const correction = {
    classification: document.getElementById("em-classification").value,
    action:         document.getElementById("em-action").value,
    draft_reply:    document.getElementById("em-draft").value || null
  };
  try {
    await api(`/emails/${currentEmailId}`, "PATCH", { user_correction: JSON.stringify(correction) });
    const email = allEmails.find(e => e.gmail_id === currentEmailId);
    if (email) email.user_correction = JSON.stringify(correction);
    closeEmailModal(); renderEmails(); showToast("Corrección guardada ✓");
  } catch(e) { showToast(e.message, "error"); }
}

document.addEventListener("DOMContentLoaded", function() {
  const modal = document.getElementById("emailModal");
  if (modal) modal.addEventListener("click", e => { if(e.target === modal) closeEmailModal(); });
});

</script>
</body>
</html>
