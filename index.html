<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do · Tobin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0e10; --surface:#18181c; --border:#2e2e38;
    --accent:#c8f060; --accent2:#60f0c8; --text:#f0f0ee;
    --muted:#7a7a8a; --danger:#f06060;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; }
  input,select { background:var(--surface); border:1.5px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:13px; padding:10px 13px; border-radius:9px; outline:none; width:100%; }
  input:focus,select:focus { border-color:var(--accent); }
  input::placeholder { color:#4a4a5a; }
  select option { background:var(--surface); }
  button { cursor:pointer; font-family:'DM Mono',monospace; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .container { max-width:740px; margin:0 auto; padding:36px 16px 80px; }
  .label { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(1.8rem,5vw,3rem); font-weight:800; letter-spacing:-0.02em; line-height:1; }
  h1 span { color:var(--accent); }
  .stats { display:flex; gap:20px; margin-top:12px; flex-wrap:wrap; }
  .stat { font-size:12px; color:var(--muted); }
  .stat strong { color:var(--text); font-weight:500; }

  .header-row { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:28px; }
  .btn-primary { background:var(--accent); color:#0e0e10; border:none; border-radius:10px; padding:11px 22px; font-family:'Syne',sans-serif; font-size:14px; font-weight:800; white-space:nowrap; }
  .btn-primary:hover { opacity:0.85; }
  .btn-icon { background:var(--surface); border:1.5px solid var(--border); color:var(--muted); border-radius:10px; padding:11px 16px; font-size:13px; }
  .btn-icon:hover { border-color:var(--accent); color:var(--accent); }

  .filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--muted); font-size:11px; padding:6px 14px; border-radius:20px; }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#0e0e10; font-weight:600; }

  .tasks { display:flex; flex-direction:column; gap:8px; }
  .task { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:13px 16px; display:flex; align-items:center; gap:12px; animation:fadeUp 0.2s ease both; transition:opacity 0.2s; }
  .task.done { opacity:0.45; }
  .task.in-progress { border-color:rgba(240,192,96,0.2); }

  .check { width:22px; height:22px; border-radius:6px; border:2px solid #3e3e50; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:#0e0e10; font-size:11px; font-weight:700; user-select:none; transition:all 0.15s; }
  .check.done { background:var(--accent); border-color:var(--accent); }
  .check.progress { border-color:#f0c060; }

  .task-body { flex:1; min-width:0; }
  .task-name { font-size:13px; line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .task.done .task-name { text-decoration:line-through; color:var(--muted); }
  .task-sub { display:flex; gap:10px; margin-top:4px; flex-wrap:wrap; }
  .task-sub span { font-size:11px; color:var(--muted); }
  .task-sub .monto { color:var(--accent2); }

  .task-meta { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .badge { font-size:10px; padding:3px 8px; border-radius:4px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap; }
  .btn-action { background:none; border:none; color:#4a4a5a; font-size:13px; padding:2px 5px; border-radius:4px; line-height:1; }
  .btn-action:hover { color:var(--muted); }
  .btn-del:hover { color:var(--danger); }

  .empty { text-align:center; padding:56px 0; color:#5a5a6a; font-size:13px; }
  .spinner { width:26px; height:26px; border:2.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
  .error-box { text-align:center; padding:40px; color:var(--danger); font-size:13px; line-height:1.8; }

  /* Modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px; animation:fadeIn 0.2s ease; }
  .modal { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:28px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
  .modal h2 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-bottom:20px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .cuota-row { display:flex; align-items:center; gap:8px; }
  .cuota-num { font-size:11px; color:#5a5a6a; width:24px; flex-shrink:0; }
  .cuota-check { width:22px; height:22px; border-radius:6px; border:2px solid #3e3e50; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:#0e0e10; font-size:11px; font-weight:700; }
  .cuota-check.paid { background:var(--accent); border-color:var(--accent); }
  .modal-footer { display:flex; gap:10px; margin-top:22px; }
  .btn-cancel { flex:1; background:#111114; border:1.5px solid var(--border); color:var(--muted); font-size:13px; padding:11px; border-radius:9px; }
  .btn-save { flex:2; background:var(--accent); color:#0e0e10; border:none; font-family:'Syne',sans-serif; font-size:14px; font-weight:800; padding:11px; border-radius:9px; }

  /* Toast */
  #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:#222228; border:1.5px solid var(--border); color:var(--text); font-size:13px; padding:12px 22px; border-radius:10px; z-index:999; white-space:nowrap; transition:transform 0.3s ease; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.success { border-color:var(--accent); color:var(--accent); }
  #toast.error { border-color:var(--danger); color:var(--danger); }

  /* Confirm */
  .confirm-box { background:var(--surface); border:1.5px solid var(--danger); border-radius:14px; padding:28px; max-width:320px; width:100%; text-align:center; }
  .confirm-box h3 { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:10px; }
  .confirm-box p { font-size:13px; color:var(--muted); margin-bottom:22px; }
  .btn-confirm-del { flex:1; background:var(--danger); color:#fff; border:none; font-family:'Syne',sans-serif; font-size:14px; font-weight:800; padding:11px; border-radius:9px; }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div>
      <div class="label">● sincronizado con telegram</div>
      <h1>To-Do<span>.</span></h1>
      <div class="stats">
        <div class="stat"><strong id="s-total">0</strong> tareas</div>
        <div class="stat"><strong id="s-pend">0</strong> pendientes</div>
        <div class="stat"><strong id="s-prog">0</strong> en progreso</div>
        <div class="stat"><strong id="s-done">0</strong> listos</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-icon" onclick="fetchTasks()">↺</button>
      <button class="btn-primary" onclick="openModal()">+ Nueva tarea</button>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('Pendiente',this)">Pendientes</button>
    <button class="filter-btn" onclick="setFilter('En progreso',this)">En progreso</button>
    <button class="filter-btn" onclick="setFilter('Listo',this)">Listos</button>
    <button class="filter-btn" onclick="setFilter('Alta',this)">🔴 Alta</button>
    <button class="filter-btn" onclick="setFilter('Media',this)">🟡 Media</button>
    <button class="filter-btn" onclick="setFilter('Baja',this)">🟢 Baja</button>
  </div>

  <div id="taskList"><div style="text-align:center;padding:48px 0"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Conectando...</div></div></div>
</div>

<!-- Modal -->
<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <h2 id="modal-title">Nueva tarea</h2>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="field"><label>Nombre *</label><input id="f-nombre" placeholder="Describe la tarea..." /></div>
      <div class="grid2">
        <div class="field"><label>Estado</label>
          <select id="f-estado"><option>Pendiente</option><option>En progreso</option><option>Listo</option></select>
        </div>
        <div class="field"><label>Urgencia</label>
          <select id="f-urgencia"><option>Alta</option><option selected>Media</option><option>Baja</option></select>
        </div>
      </div>
      <div class="grid2">
        <div class="field"><label>Fecha límite</label><input type="date" id="f-fecha" style="colorScheme:dark" /></div>
        <div class="field"><label>N° cuotas</label><input type="number" id="f-cuotas" value="1" min="1" max="60" onchange="updateCuotaUI()" /></div>
      </div>
      <div style="background:#111114;border:1.5px solid var(--border);border-radius:10px;padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase">Cuotas</span>
          <span id="cuota-total" style="font-size:11px;color:var(--accent2)"></span>
        </div>
        <div id="cuota-list" style="display:flex;flex-direction:column;gap:7px"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="overlay" id="confirm" style="display:none">
  <div class="confirm-box">
    <h3>¿Eliminar tarea?</h3>
    <p>Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-cancel" style="flex:1" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_URL = "https://tobin-bot-production.up.railway.app";
const HEADERS = { "Content-Type":"application/json", "x-api-key":"tobin2024" };

let allTasks   = [];
let curFilter  = "all";
let editingId  = null;
let deletingId = null;

const S_STYLE = {
  "Pendiente":   "background:rgba(120,120,140,0.15);color:#9090b8",
  "En progreso": "background:rgba(240,192,96,0.15);color:#f0c060",
  "Listo":       "background:rgba(200,240,96,0.12);color:#c8f060",
};
const U_STYLE = {
  "Alta":  "background:rgba(240,96,96,0.15);color:#f06060",
  "Media": "background:rgba(240,192,96,0.15);color:#f0c060",
  "Baja":  "background:rgba(96,240,200,0.15);color:#60f0c8",
};
const S_ICON = { "Pendiente":"⏳","En progreso":"🔄","Listo":"✅" };
const U_ICON = { "Alta":"🔴","Media":"🟡","Baja":"🟢" };
const STATUS = ["Pendiente","En progreso","Listo"];

// ── API ───────────────────────────────────────────────────────
async function fetchTasks() {
  document.getElementById("taskList").innerHTML = `<div style="text-align:center;padding:48px 0"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Cargando...</div></div>`;
  try {
    const res  = await fetch(`${API_URL}/tasks`, { headers: HEADERS });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error");
    allTasks = data.tasks || [];
    render();
  } catch(e) {
    document.getElementById("taskList").innerHTML = `<div class="error-box">⚠️ ${e.message}<br><br><button class="btn-primary" onclick="fetchTasks()">↺ Reintentar</button></div>`;
  }
}

async function createTask(body) {
  const res  = await fetch(`${API_URL}/tasks`, { method:"POST", headers:HEADERS, body:JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error);
  return data.task;
}

async function updateTask(id, body) {
  const res  = await fetch(`${API_URL}/tasks/${id}`, { method:"PATCH", headers:HEADERS, body:JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error);
  return data.task;
}

async function deleteTask(id) {
  const res = await fetch(`${API_URL}/tasks/${id}`, { method:"DELETE", headers:HEADERS });
  if (!res.ok) throw new Error("Error al eliminar");
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const tasks = allTasks.filter(t => {
    if (curFilter==="all") return true;
    if (["Pendiente","En progreso","Listo"].includes(curFilter)) return t.estado===curFilter;
    if (["Alta","Media","Baja"].includes(curFilter)) return t.urgencia===curFilter;
    return true;
  });

  updateStats();

  if (!tasks.length) {
    document.getElementById("taskList").innerHTML = `<div class="empty">${allTasks.length===0?"No hay tareas. ¡Crea la primera!":"Sin resultados para este filtro."}</div>`;
    return;
  }

  document.getElementById("taskList").innerHTML = tasks.map((t,i) => {
    const isDone = t.estado==="Listo", isProg = t.estado==="En progreso";
    const cuotasPag = (t.cuotaList||[]).filter(c=>c.pagada).length;
    const totalC    = (t.cuotaList||[]).length;
    const totalM    = (t.cuotaList||[]).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
    const checkCls  = isDone?"done":isProg?"progress":"";
    const checkTxt  = isDone?"✓":isProg?"…":"";
    const taskCls   = isDone?"done":isProg?"in-progress":"";

    return `<div class="task ${taskCls}" style="animation-delay:${i*0.025}s">
      <div class="check ${checkCls}" onclick="toggleEstado(${t.id})">${checkTxt}</div>
      <div class="task-body">
        <div class="task-name">${esc(t.nombre)}</div>
        <div class="task-sub">
          ${t.fecha?`<span>📅 ${t.fecha}</span>`:""}
          ${totalM>0?`<span class="monto">$${totalM.toLocaleString()} · ${cuotasPag}/${totalC} cuotas</span>`:""}
        </div>
      </div>
      <div class="task-meta">
        ${t.urgencia?`<span class="badge" style="${U_STYLE[t.urgencia]}">${U_ICON[t.urgencia]} ${t.urgencia}</span>`:""}
        ${t.estado?`<span class="badge" style="${S_STYLE[t.estado]}">${S_ICON[t.estado]} ${t.estado}</span>`:""}
        <button class="btn-action" onclick="openModal(${t.id})">✏️</button>
        <button class="btn-action btn-del" onclick="openConfirm(${t.id})">✕</button>
      </div>
    </div>`;
  }).join("");
}

function updateStats() {
  document.getElementById("s-total").textContent = allTasks.length;
  document.getElementById("s-pend").textContent  = allTasks.filter(t=>t.estado==="Pendiente").length;
  document.getElementById("s-prog").textContent  = allTasks.filter(t=>t.estado==="En progreso").length;
  document.getElementById("s-done").textContent  = allTasks.filter(t=>t.estado==="Listo").length;
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

async function toggleEstado(id) {
  const task = allTasks.find(t=>t.id===id); if (!task) return;
  const next = STATUS[(STATUS.indexOf(task.estado)+1) % STATUS.length];
  task.estado = next; render();
  try { await updateTask(id, { estado:next }); }
  catch(e) { task.estado = STATUS[(STATUS.indexOf(next)-1+3)%3]; render(); showToast(e.message,"error"); }
}

// ── Modal ─────────────────────────────────────────────────────
let cuotaData = [];

function openModal(id) {
  editingId = id || null;
  const task = id ? allTasks.find(t=>t.id===id) : null;
  document.getElementById("modal-title").textContent = id ? "Editar tarea" : "Nueva tarea";
  document.getElementById("f-nombre").value  = task?.nombre  || "";
  document.getElementById("f-estado").value  = task?.estado  || "Pendiente";
  document.getElementById("f-urgencia").value= task?.urgencia|| "Media";
  document.getElementById("f-fecha").value   = task?.fecha   || "";
  document.getElementById("f-cuotas").value  = task?.cuotas  || 1;
  cuotaData = task?.cuotaList ? task.cuotaList.map(c=>({...c})) : [{ n:1, monto:"", pagada:false }];
  renderCuotas();
  document.getElementById("modal").style.display = "flex";
  document.getElementById("f-nombre").focus();
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  editingId = null;
}

function updateCuotaUI() {
  const num = Math.max(1, Math.min(60, parseInt(document.getElementById("f-cuotas").value)||1));
  while (cuotaData.length < num) cuotaData.push({ n:cuotaData.length+1, monto:"", pagada:false });
  cuotaData = cuotaData.slice(0, num);
  renderCuotas();
}

function renderCuotas() {
  const el = document.getElementById("cuota-list");
  el.innerHTML = cuotaData.map((c,i) => `
    <div class="cuota-row">
      <span class="cuota-num">#${c.n}</span>
      <input type="number" placeholder="Monto" value="${c.monto||""}" style="flex:1;padding:7px 10px" oninput="cuotaData[${i}].monto=this.value;updateCuotaTotal()" />
      <div class="cuota-check ${c.pagada?"paid":""}" onclick="cuotaData[${i}].pagada=!cuotaData[${i}].pagada;renderCuotas()">${c.pagada?"✓":""}</div>
    </div>`).join("");
  updateCuotaTotal();
}

function updateCuotaTotal() {
  const total   = cuotaData.reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const pagadas = cuotaData.filter(c=>c.pagada).length;
  document.getElementById("cuota-total").textContent = total>0 ? `$${total.toLocaleString()} · ${pagadas}/${cuotaData.length} pagadas` : "";
}

async function saveTask() {
  const nombre = document.getElementById("f-nombre").value.trim();
  if (!nombre) { showToast("Escribe un nombre","error"); return; }
  const body = {
    nombre,
    estado:    document.getElementById("f-estado").value,
    urgencia:  document.getElementById("f-urgencia").value,
    fecha:     document.getElementById("f-fecha").value,
    monto:     cuotaData.reduce((s,c)=>s+(parseFloat(c.monto)||0),0),
    cuotas:    cuotaData.length,
    cuotaList: cuotaData.map(c=>({...c, monto:parseFloat(c.monto)||0}))
  };
  try {
    if (editingId) {
      const updated = await updateTask(editingId, body);
      const idx = allTasks.findIndex(t=>t.id===editingId);
      if (idx>-1) allTasks[idx] = updated;
      showToast("Tarea actualizada ✓");
    } else {
      const task = await createTask(body);
      allTasks.unshift(task);
      showToast("Tarea creada ✓");
    }
    closeModal(); render();
  } catch(e) { showToast(e.message,"error"); }
}

// ── Delete ────────────────────────────────────────────────────
function openConfirm(id) { deletingId=id; document.getElementById("confirm").style.display="flex"; }
function closeConfirm()  { deletingId=null; document.getElementById("confirm").style.display="none"; }
async function confirmDelete() {
  try {
    await deleteTask(deletingId);
    allTasks = allTasks.filter(t=>t.id!==deletingId);
    closeConfirm(); render();
    showToast("Eliminada");
  } catch(e) { showToast(e.message,"error"); }
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.className="", 2500);
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// Close modal on overlay click
document.getElementById("modal").addEventListener("click", e => { if(e.target===document.getElementById("modal")) closeModal(); });
document.getElementById("confirm").addEventListener("click", e => { if(e.target===document.getElementById("confirm")) closeConfirm(); });

fetchTasks();
</script>
</body>
</html>
